<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Calculateur 🇭🇹</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --bg: #f1f5f9;
            --error: #fee2e2;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            color: #1e293b;
        }

        h1 { text-align: center; font-size: 24px; margin-bottom: 20px; }

        /* ESPACE PUBLICITÉ */
        .ad-space {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }
        .ad-space:hover { transform: scale(1.02); }

        .input-group { background: #f8fafc; padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #64748b; }

        input, select {
            width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px;
            font-size: 15px; outline: none; margin-bottom: 10px; box-sizing: border-box;
        }

        .row { display: flex; gap: 8px; margin-bottom: 8px; padding: 8px; border-radius: 12px; transition: 0.3s; align-items: center; }
        .row-error { background-color: var(--error); border: 1px solid #ef4444; }

        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-add { background: #f1f5f9; color: var(--primary); border: 2px dashed #cbd5e1; margin-bottom: 10px; }
        .btn-calc { background: var(--primary); color: white; }

        #res { margin-top: 20px; padding: 20px; border-radius: 16px; background: #f8fafc; text-align: center; display: none; }
        .score { font-size: 32px; font-weight: 800; color: var(--primary); }

        /* PROFILE CARD STEEVY */
        .profile-card {
            background: #1e293b;
            color: white;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            border-radius: 24px;
            text-align: center;
            margin-top: 20px;
            box-sizing: border-box;
        }
        .profile-card h2 { color: #60a5fa; font-size: 18px; }
        .social-links { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .social-btn {
            padding: 12px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 14px; color: white;
        }
        .btn-wa { background: #25d366; }
        .btn-google { background: #ea4335; }
        .btn-trash { background: #fee2e2; color: #ef4444; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; margin-top: 15px; font-size: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <a href="https://wa.me/509TON_NUMERO?text=Salut%20Steevy,%20je%20souhaite%20en%20savoir%20plus%20sur%20tes%20services" class="ad-space">
            🚀 Boostez vos projets avec Steevy Dev ! <br> Cliquez ici pour m'écrire sur WhatsApp.
        </a>

        <h1>🇭🇹 Mon Calculateur</h1>

        <div class="input-group">
            <label>Moyenne d'admission de l'école :</label>
            <input type="number" id="moy-ecole" value="5.00" step="0.1">
            
            <label>Nombre de trimestres :</label>
            <select id="trimestres">
                <option value="1">1 Trimestre</option>
                <option value="2">2 Trimestres</option>
                <option value="3" selected>3 Trimestres</option>
            </select>
        </div>

        <div id="list">
            <div class="row">
                <input type="number" class="note" placeholder="Note" oninput="verifier(this)">
                <input type="number" class="coeff" placeholder="Coeff" oninput="verifier(this)">
            </div>
        </div>

        <button class="btn btn-add" onclick="add()">+ Ajouter une matière</button>
        <button class="btn btn-calc" onclick="calculate()">SIMULER L'ADMISSION</button>

        <div id="res">
            <div class="score" id="score-text"></div>
            <div id="msg-text" style="margin-top:10px; font-weight:500;"></div>
            <button class="btn-trash" onclick="location.reload()">🗑️</button>
        </div>
    </div>

    <div class="profile-card">
        <h2>👨‍💻 Contact Développeur</h2>
        <p>Projet réalisé par Steevy. Contactez-moi pour vos besoins en programmation.</p>
        <div class="social-links">
            <a href="https://wa.me/50940614011" class="social-btn btn-wa">💬 WhatsApp : +509 TON_NUMERO</a>
            <a href="mailto:corvensleysteeveperrier@gmail.com" class="social-btn btn-google">📧 Google : TON_EMAIL@gmail.com</a>
        </div>
    </div>

    <script>
        function verifier(input) {
            const row = input.parentElement;
            const n = parseFloat(row.querySelector('.note').value);
            const c = parseFloat(row.querySelector('.coeff').value);
            if (!isNaN(n) && !isNaN(c) && n > c) row.classList.add('row-error');
            else row.classList.remove('row-error');
        }

        function add() {
            const div = document.createElement('div');
            div.className = 'row';
            div.innerHTML = `<input type="number" class="note" placeholder="Note" oninput="verifier(this)"><input type="number" class="coeff" placeholder="Coeff" oninput="verifier(this)">`;
            document.getElementById('list').appendChild(div);
        }

        function calculate() {
            const rows = document.querySelectorAll('.row');
            const target = parseFloat(document.getElementById('moy-ecole').value);
            let p = 0, c = 0, err = false;

            rows.forEach(r => {
                const nv = parseFloat(r.querySelector('.note').value);
                const cv = parseFloat(r.querySelector('.coeff').value);
                if (!isNaN(nv) && !isNaN(cv)) {
                    if (nv > cv) { err = true; r.classList.add('row-error'); }
                    else { p += nv; c += cv; }
                }
            });

            if (err) { alert("Corrige les lignes en rouge !"); return; }
            if (c > 0) {
                const moy10 = (p / c) * 10;
                document.getElementById('res').style.display = 'block';
                document.getElementById('score-text').innerText = moy10.toFixed(2) + " / 10";
                const msg = document.getElementById('msg-text');
                if (moy10 >= target) {
                    msg.style.color = "#15803d";
                    msg.innerText = "Admission probable ! 🎉 Quel excellent travail, continue de viser l'excellence !";
                } else {
                    msg.style.color = "#b91c1c";
                    msg.innerText = "C'est un peu juste... 🚀 Ne baisse pas les bras, concentre-toi sur tes points faibles !";
                }
            }
        }
    </script>
</body>
</html>

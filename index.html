<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur Scolaire Officiel</title>
    <style>
        :root { --primary: #007bff; --google: #db4437; --whatsapp: #25d366; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 15px; margin: 0; }
        .container { max-width: 500px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin: auto; }
        
        h2 { color: var(--primary); text-align: center; margin-bottom: 20px; }
        .section { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #e1e4e8; }
        
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        
        .matiere-row { display: flex; gap: 8px; margin-bottom: 8px; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* ESPACE PUB */
        .ads-space { margin-top: 20px; padding: 15px; border: 2px dashed #bbb; border-radius: 12px; text-align: center; background: #fff; color: #777; font-weight: bold; }

        /* ANCIEN FORMAT : BOUTONS CONTACT */
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .contact-item { padding: 10px; border-radius: 10px; text-align: center; text-decoration: none; color: white; font-size: 13px; font-weight: bold; }
        .bg-google { background: var(--google); }
        .bg-whatsapp { background: var(--whatsapp); }

        /* RESULTATS ET FÉLICITATIONS */
        .resultat { margin-top: 20px; padding: 20px; border-radius: 12px; text-align: center; font-weight: bold; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .danger { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* PROFILE CARD */
        .profile-card { margin-top: 25px; background: #333; color: white; padding: 15px; border-radius: 15px; text-align: center; }
        .profile-card h4 { margin: 5px 0; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Super Calculateur 🇭🇹</h2>

    <div class="section">
        <label>Moyenne de passage de ton école :</label>
        <input type="number" id="moy_passage" value="5.00" step="0.1" min="0" max="10">
        
        <label>Combien de trimestres au total ?</label>
        <select id="nb_trimestres" onchange="majTrimestres()">
            <option value="3">3 Trimestres (Classique)</option>
            <option value="4">4 Trimestres</option>
            <option value="5">5 Trimestres</option>
        </select>
    </div>

    <div id="zone_passes" class="section">
        <div id="inputs_passes"></div>
    </div>

    <div class="section">
        <label>Détails du trimestre en cours :</label>
        <div id="matieres">
            <div class="matiere-row">
                <input type="number" class="note" placeholder="Note /10" max="10">
                <input type="number" class="coeff" placeholder="Coeff" value="1">
            </div>
        </div>
        <button onclick="ajouterMatiere()" style="background:#6c757d; padding: 8px; font-size: 11px;">+ Ajouter une matière</button>
    </div>

    <button onclick="calculerTout()">CALCULER MON RÉSULTAT</button>

    <div id="bilan" class="resultat"></div>

    <div class="ads-space">
        <p>📢 ESPACE PUBLICITAIRE RÉSERVÉ<br><span style="font-size: 11px; font-weight: normal;">Contactez le développeur pour placer votre annonce.</span></p>
    </div>

    <div class="contact-grid">
        <a href="mailto:corvensleysteeveperrier@gmail.com" class="contact-item bg-google">📧 Compte Google</a>
        <a href="https://wa.me/50940614011" class="contact-item bg-whatsapp">💬 WhatsApp</a>
    </div>

    <div class="profile-card">
        <h4>Corvensley Steeve Perrier</h4>
        <p>Développeur Logiciel | Computer Science Student</p>
    </div>
</div>

<script>
function majTrimestres() {
    const total = document.getElementById('nb_trimestres').value;
    const zone = document.getElementById('inputs_passes');
    zone.innerHTML = "<strong>Moyennes déjà obtenues :</strong>";
    for(let i = 1; i < total; i++) {
        zone.innerHTML += `<input type="number" class="moy_historique" placeholder="Moyenne Trimestre ${i}" step="0.01" style="margin-top:8px;">`;
    }
}

function ajouterMatiere() {
    const div = document.createElement('div');
    div.className = 'matiere-row';
    div.innerHTML = '<input type="number" class="note" placeholder="Note /10" max="10"><input type="number" class="coeff" placeholder="Coeff" value="1">';
    document.getElementById('matieres').appendChild(div);
}

function calculerTout() {
    let totalPoints = 0, totalCoeffs = 0;
    document.querySelectorAll('.note').forEach((n, i) => {
        let val = parseFloat(n.value) || 0;
        let c = parseFloat(document.querySelectorAll('.coeff')[i].value) || 1;
        totalPoints += (val * c); totalCoeffs += c;
    });

    let moyActuelle = totalPoints / totalCoeffs;
    let sommeMoyennes = moyActuelle, nb = 1;
    document.querySelectorAll('.moy_historique').forEach(p => {
        if(p.value !== "") { sommeMoyennes += parseFloat(p.value); nb++; }
    });

    let finale = sommeMoyennes / nb;
    let passage = parseFloat(document.getElementById('moy_passage').value);
    let bilan = document.getElementById('bilan');
    bilan.style.display = "block";

    let messageFelicitation = "";
    if (finale >= 8) messageFelicitation = "🌟 Excellent ! Tu es un génie !";
    else if (finale >= 7) messageFelicitation = "👏 Très bon travail, continue !";
    else if (finale >= passage) messageFelicitation = "✅ Félicitations ! Tu es admis(e).";
    else messageFelicitation = "❌ Attention ! Il faut travailler davantage.";

    bilan.className = finale >= passage ? "resultat success" : "resultat danger";
    bilan.innerHTML = `Moyenne Annuelle : ${finale.toFixed(2)} / 10<br>${messageFelicitation}`;
}
majTrimestres();
</script>
</body>
</html>

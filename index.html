<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Calculateur 🇭🇹</title>
    <style>
        :root { 
            --primary: #2563eb; 
            --dark: #0f172a; 
            --bg: #f1f5f9; 
            --error-bg: #fee2e2; 
            --error-border: #ef4444; 
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--dark); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0; 
            color: #1e293b;
        }
        
        .container { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 20px; }
        
        h1 { color: white; text-align: center; font-size: 26px; margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        /* ESPACE PUBLICITAIRE À LOUER */
        .ad-container { width: 100%; }
        .ad-link { text-decoration: none; display: block; transition: 0.3s; }
        .ad-link:hover { transform: scale(1.02); }
        .ad-content { 
            background: #f8fafc; 
            border: 2px dashed #94a3b8; 
            padding: 15px; 
            border-radius: 20px; 
            text-align: center; 
            position: relative; 
            animation: pulse-border 2s infinite; 
        }
        .ad-badge { position: absolute; top: 0; left: 0; background: #94a3b8; color: white; font-size: 9px; font-weight: bold; padding: 3px 8px; border-bottom-right-radius: 10px; }
        .ad-text { font-size: 16px; font-weight: 800; color: #64748b; margin: 5px 0; }
        .ad-cta { font-size: 12px; color: var(--primary); font-weight: 600; text-decoration: underline; }
        @keyframes pulse-border { 0%, 100% { border-color: #94a3b8; } 50% { border-color: var(--primary); } }

        /* CARTES */
        .card { background: white; padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; font-size: 18px; color: var(--primary); border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-top: 0; }
        
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #64748b; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 15px; outline: none; margin-bottom: 10px; box-sizing: border-box; }
        
        /* LIGNES DE MATIÈRES */
        .row { display: flex; gap: 10px; margin-bottom: 10px; padding: 5px; border-radius: 12px; transition: 0.3s; }
        .row-error { background-color: var(--error-bg); border: 1px solid var(--error-border); }
        
        /* BOUTONS */
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-add { background: #f1f5f9; color: var(--primary); border: 2px dashed #cbd5e1; margin-bottom: 15px; }
        .btn-calc { background: var(--primary); color: white; flex: 1; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); }
        .btn-trash-small { background: #fee2e2; color: #ef4444; width: 50px; height: 50px; border-radius: 12px; border: none; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }

        /* AFFICHAGE RÉSULTATS */
        .res-box { margin-top: 15px; padding: 15px; border-radius: 16px; background: #f8fafc; text-align: center; display: none; border: 1px solid #e2e8f0; }
        .score { font-size: 32px; font-weight: 800; color: var(--primary); margin: 5px 0; }

        /* PROFILE CARD */
        .profile-card { background: #1e293b; color: white; padding: 20px; border-radius: 24px; text-align: center; margin-top: 10px; }
        .social-btn { display: block; padding: 12px; border-radius: 12px; text-decoration: none; color: white; margin-top: 10px; font-weight: bold; transition: 0.3s; }
        .social-btn:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <h1>🇭🇹 Mon Calculateur</h1>

    <div class="ad-container">
        <a href="https://wa.me/50940614011?text=Bonjour%20Steevy,%20je%20souhaite%20réserver%20l'espace%20pub%20sur%20votre%20site" class="ad-link">
            <div class="ad-content">
                <span class="ad-badge">ANNONCE</span>
                <p class="ad-text">VOTRE PUBLICITÉ ICI</p>
                <span class="ad-cta">Cliquez pour louer cet espace 🚀</span>
            </div>
        </a>
    </div>

    <div class="card">
        <h2>📚 Calculateur de Notes</h2>
        <div id="list-notes">
            <div class="row">
                <input type="number" class="note" placeholder="Note obtenue" oninput="checkNote(this)">
                <input type="number" class="coeff" placeholder="Sur (Coeff)" oninput="checkNote(this)">
            </div>
        </div>
        <button class="btn btn-add" onclick="addMatiere()">+ Ajouter une matière</button>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-calc" onclick="calculerNotes()">CALCULER (MOYENNE /10)</button>
            <button class="btn-trash-small" onclick="resetPart(1)" title="Effacer">🗑️</button>
        </div>
        <div id="res-notes" class="res-box">
            <span style="font-size:12px; color:#64748b;">Ta moyenne finale est de :</span>
            <div class="score" id="val-moyenne">-- / 10</div>
        </div>
    </div>

    <div class="card">
        <h2>🎯 Simulateur d'Admission</h2>
        <label>Moyenne de passage de ton école :</label>
        <input type="number" id="moy-passage" value="5.00" step="0.01">
        
        <label>Nombre total de trimestres :</label>
        <select id="nb-trimestres" onchange="genererInputsTrimestres()">
            <option value="2">2 Trimestres</option>
            <option value="3" selected>3 Trimestres</option>
            <option value="4">4 Trimestres</option>
            <option value="5">5 Trimestres</option>
        </select>

        <div id="zone-trimestres">
            </div>

        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn btn-calc" onclick="simulerAdmission()">VOIR MON OBJECTIF</button>
            <button class="btn-trash-small" onclick="resetPart(2)" title="Effacer">🗑️</button>
        </div>

        <div id="res-simu" class="res-box">
            <div id="simu-status" style="font-weight:bold; font-size:18px;"></div>
            <div id="simu-detail" style="margin-top:5px; font-size:14px; color:#64748b;"></div>
        </div>
    </div>

    <div class="profile-card">
        <h3 style="margin:0 0 5px 0;">👨‍💻 Steevy Dev</h3>
        <p style="font-size:13px; color:#94a3b8; margin-bottom:15px;">Contactez-moi pour vos projets</p>
        
        <a href="https://wa.me/50940614011" class="social-btn" style="background:#25d366;">
            💬 WhatsApp : +509...
        </a>
        
        <a href="mailto:corvenleysteeveperrier@gmail.com" class="social-btn" style="background:#ea4335;">
            📧 Gmail : ...@gmail.com
        </a>
    </div>
</div>

<script>
    // --- LOGIQUE CALCULATEUR ---
    function checkNote(el) {
        let row = el.parentElement;
        let n = parseFloat(row.querySelector('.note').value);
        let c = parseFloat(row.querySelector('.coeff').value);
        if (n > c) row.classList.add('row-error'); else row.classList.remove('row-error');
    }

    function addMatiere() {
        let container = document.getElementById('list-notes');
        let div = document.createElement('div');
        div.className = 'row';
        div.innerHTML = '<input type="number" class="note" placeholder="Note obtenue" oninput="checkNote(this)"><input type="number" class="coeff" placeholder="Sur (Coeff)" oninput="checkNote(this)">';
        container.appendChild(div);
    }

    function calculerNotes() {
        let rows = document.querySelectorAll('#list-notes .row'), p = 0, c = 0, err = false;
        rows.forEach(r => {
            let nv = parseFloat(r.querySelector('.note').value), cv = parseFloat(r.querySelector('.coeff').value);
            if (!isNaN(nv) && !isNaN(cv)) { 
                if (nv > cv) err = true; else { p += nv; c += cv; }
            }
        });
        if (err) { alert("Une note ne peut pas être supérieure à son coefficient !"); return; }
        if (c > 0) {
            document.getElementById('res-notes').style.display = 'block';
            document.getElementById('val-moyenne').innerText = ((p / c) * 10).toFixed(2) + " / 10";
        } else { alert("Veuillez remplir au moins une ligne."); }
    }

    // --- LOGIQUE SIMULATEUR ---
    function genererInputsTrimestres() {
        let zone = document.getElementById('zone-trimestres'), n = parseInt(document.getElementById('nb-trimestres').value);
        zone.innerHTML = '<label>Moyennes déjà obtenues :</label>';
        for (let i = 1; i < n; i++) {
            let inp = document.createElement('input'); 
            inp.type = 'number'; inp.className = 't-inp'; inp.placeholder = `Moyenne Trimestre ${i}`; inp.step = '0.01';
            zone.appendChild(inp);
        }
    }

    function simulerAdmission() {
        let passage = parseFloat(document.getElementById('moy-passage').value);
        let nTotal = parseInt(document.getElementById('nb-trimestres').value);
        let inputs = document.querySelectorAll('.t-inp'), somme = 0, count = 0;
        
        inputs.forEach(i => { let v = parseFloat(i.value); if (!isNaN(v)) { somme += v; count++; } });
        
        let res = document.getElementById('res-simu'), st = document.getElementById('simu-status'), det = document.getElementById('simu-detail');
        res.style.display = 'block';
        
        if (count === 0) { alert("Entre au moins une moyenne passée !"); return; }

        let nRestants = nTotal - count;
        let req = ((passage * nTotal) - somme) / nRestants;

        const msgsPositifs = ["Admission assurée ! 🎉", "Tu es un génie ! ✨", "Le succès est là ! 🏆"];
        const msgsEncouragement = ["C'est faisable ! 💪", "Ne lâche rien ! 🔥", "Tu vas y arriver ! 🚀", "Dernier effort ! ✍️"];

        if (req <= 0) {
            st.innerText = msgsPositifs[Math.floor(Math.random()*msgsPositifs.length)];
            st.style.color = "#15803d";
            det.innerText = "Tu as déjà assez de points pour ton année ! Bravo !";
        } else if (req > 10) {
            st.innerText = "Objectif très difficile ❌";
            st.style.color = "#b91c1c";
            det.innerText = "Il te faudrait une note impossible. Donne tout pour finir en beauté !";
        } else {
            st.innerText = `Objectif : ${req.toFixed(2)} / 10`;
            st.style.color = "#2563eb";
            det.innerText = msgsEncouragement[Math.floor(Math.random()*msgsEncouragement.length)];
        }
    }

    function resetPart(n) {
        if (n === 1) {
            document.getElementById('list-notes').innerHTML = '<div class="row"><input type="number" class="note" placeholder="Note obtenue" oninput="checkNote(this)"><input type="number" class="coeff" placeholder="Sur (Coeff)" oninput="checkNote(this)"></div>';
            document.getElementById('res-notes').style.display = 'none';
        } else {
            genererInputsTrimestres();
            document.getElementById('res-simu').style.display = 'none';
        }
    }

    window.onload = genererInputsTrimestres;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Calculateur - Haiti</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 10px; margin: 0; }
        .container { max-width: 400px; background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; padding-bottom: 20px; }
        
        /* HEADER STYLE */
        .btn-blue { background: #1a73e8; color: white; padding: 15px; width: 90%; margin: 15px auto; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; display: block; font-size: 16px; }
        
        /* NOTE SUR 10 BOX */
        .note-display { background: #f8f9fa; border: 1px solid #e1e4e8; border-radius: 15px; width: 80%; margin: 10px auto; padding: 30px 0; text-align: center; font-size: 40px; font-weight: bold; color: #333; }
        
        /* SECTION STYLE */
        .section { background: white; border-radius: 15px; border: 1px solid #e1e4e8; padding: 15px; width: 85%; margin: 15px auto; }
        .section-title { color: #1a73e8; font-weight: bold; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; margin-bottom: 10px; }
        .input-error { border: 2px solid #dc3545 !important; background-color: #ffeef0; }

        /* MESSAGE ENCOURAGEMENT (VERT) */
        .bilan-trimestre { background: #d4edda; color: #155724; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; display: none; margin: 10px auto; width: 85%; }

        /* BOUTON VERT */
        .btn-green { background: #28a745; color: white; padding: 15px; width: 90%; margin: 10px auto; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; display: block; font-size: 16px; }

        /* FOOTER & ADS */
        .ads-space { border: 2px dashed #ccc; border-radius: 10px; padding: 15px; margin: 20px auto; width: 85%; text-align: center; color: #666; font-size: 14px; }
        .contact-grid { display: flex; gap: 10px; justify-content: center; width: 90%; margin: 10px auto; }
        .btn-contact { flex: 1; padding: 12px; border-radius: 8px; color: white; text-decoration: none; font-size: 14px; font-weight: bold; text-align: center; }
        .bg-google { background: #db4437; }
        .bg-whatsapp { background: #25d366; }
        
        .profile-footer { background: #222; color: white; padding: 15px; text-align: center; border-radius: 0 0 20px 20px; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-blue" onclick="calculerNote()">CALCULER & SAUVEGARDER</button>
    
    <div class="note-display" id="grosse_note">-- / 10</div>

    <div class="section">
        <label>Note du trimestre :</label>
        <input type="number" id="note_val" placeholder="Note" oninput="verifierNote(this)">
        <label>Coefficient :</label>
        <input type="number" id="coeff_val" value="10" oninput="verifierNote(this)">
    </div>

    <div id="bilan_trim" class="bilan-trimestre"></div>

    <div class="section">
        <div class="section-title">🎯 Simulateur de Réussite</div>
        <label>Moyenne de passage école :</label>
        <input type="number" id="passage" value="5.00" step="0.1">
        
        <label>Moyennes passées :</label>
        <input type="number" class="passe" placeholder="Moyenne Trimestre 1">
        <input type="number" class="passe" placeholder="Moyenne Trimestre 2">
    </div>

    <button class="btn-green" onclick="calculerAdmission()">VÉRIFIER MON ADMISSION</button>

    <div class="ads-space">
        📢 <b>ESPACE PUBLICITAIRE RÉSERVÉ</b><br>
        <span style="font-size: 11px;">Contactez le développeur pour placer votre annonce.</span>
    </div>

    <div class="contact-grid">
        <a href="#" class="btn-corvensleysteeveperrier">📧 Compte Google</a>
        <a href="https://wa.me/50940614011" class="btn-contact bg-whatsapp">💬 WhatsApp</a>
    </div>

    <div class="profile-footer">
        <b>Corvensley Steeve Perrier</b><br>
        <span style="font-size: 12px; opacity: 0.8;">Développeur Logiciel 🇭🇹</span>
    </div>
</div>

<script>
function verifierNote() {
    const n = document.getElementById('note_val');
    const c = document.getElementById('coeff_val');
    if (parseFloat(n.value) > parseFloat(c.value)) n.classList.add('input-error');
    else n.classList.remove('input-error');
}

function calculerNote() {
    const note = parseFloat(document.getElementById('note_val').value) || 0;
    const coeff = parseFloat(document.getElementById('coeff_val').value) || 10;
    
    if (note > coeff) { alert("La note dépasse le coefficient !"); return; }
    
    const noteSur10 = (note / coeff) * 10;
    document.getElementById('grosse_note').innerText = noteSur10.toFixed(2) + " / 10";
    
    const bilan = document.getElementById('bilan_trim');
    bilan.style.display = "block";
    
    // COMMENTAIRE D'ENCOURAGEMENT SUR LA NOTE
    if(noteSur10 >= 8) bilan.innerHTML = "🌟 Excellent ! Tu es un génie !";
    else if(noteSur10 >= 6) bilan.innerHTML = "👏 Très bien ! Continue comme ça !";
    else if(noteSur10 >= 5) bilan.innerHTML = "✅ C'est la moyenne, tu peux faire mieux !";
    else bilan.innerHTML = "❌ Attention, il faut redoubler d'efforts !";
}

function calculerAdmission() {
    // Logique pour l'admission annuelle ici...
}
</script>

</body>
</html>

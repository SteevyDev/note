<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur Scolaire Haïti</title>
    <style>
        :root { --primary: #1a73e8; --danger: #dc3545; --success: #28a745; --dark: #222; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 10px; margin: 0; }
        .container { max-width: 400px; background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; overflow: hidden; }
        
        .section { background: #f8f9fa; border-radius: 15px; padding: 15px; width: 85%; margin: 15px auto; border: 1px solid #e1e4e8; }
        label { display: block; font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #555; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; outline: none; transition: 0.3s; }
        
        /* ALERTE ROUGE SI NOTE > COEFF */
        .input-error { border: 2px solid var(--danger) !important; background-color: #ffeef0; color: var(--danger); }

        /* BOUTON CALCULER (DÉPLACÉ APRÈS LES NOTES) */
        .btn-calc { background: var(--primary); color: white; padding: 18px; width: 90%; margin: 10px auto; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; display: block; font-size: 16px; }

        .note-container { display: flex; align-items: center; justify-content: center; width: 90%; margin: 10px auto; gap: 10px; }
        .note-screen { flex-grow: 1; background: #e9ecef; border-radius: 15px; padding: 25px 0; text-align: center; font-size: 38px; font-weight: bold; color: #333; border: 1px solid #dee2e6; }
        .btn-clear { background: #f8d7da; border: 1px solid #f5c6cb; border-radius: 10px; padding: 15px; cursor: pointer; font-size: 20px; }

        .encouragement { background: #d4edda; color: #155724; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; display: none; margin: 10px auto; width: 85%; }

        .btn-reset-all { background: var(--danger); color: white; padding: 15px; width: 90%; margin: 20px auto 10px auto; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; display: block; }

        .ads-space { border: 2px dashed #ccc; border-radius: 10px; padding: 15px; margin: 15px auto; width: 85%; text-align: center; color: #777; font-size: 13px; text-decoration: none; display: block; }
        .contact-grid { display: flex; gap: 10px; width: 90%; margin: 10px auto; }
        .btn-contact { flex: 1; padding: 12px; border-radius: 8px; color: white; text-decoration: none; font-size: 12px; font-weight: bold; text-align: center; }
        .profile-footer { background: var(--dark); color: white; padding: 15px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    
    <div class="section">
        <label>Note actuelle :</label>
        <input type="number" id="ma_note" placeholder="Ex: 150" oninput="verifierNote()">
        <label>Sur (Coefficient) :</label>
        <input type="number" id="mon_coeff" placeholder="Ex: 200" oninput="verifierNote()">
    </div>

    <button class="btn-calc" onclick="calculerNote()">CALCULER & SAUVEGARDER</button>
    
    <div class="note-container">
        <div class="note-screen" id="ecran_note">-- / 10</div>
        <button class="btn-clear" onclick="effacerCalcul()">🗑️</button>
    </div>

    <div id="msg_encouragement" class="encouragement"></div>

    <div class="section">
        <strong style="color: var(--primary); display: block; text-align: center; margin-bottom: 10px;">🎯 Simulateur d'Admission</strong>
        <label>Moyenne de passage :</label>
        <input type="number" id="moy_ecole" value="5.00" step="0.1">
        <label>Autres moyennes :</label>
        <input type="number" class="moy_p" placeholder="Note Trimestre 1">
        <input type="number" class="moy_p" placeholder="Note Trimestre 2">
    </div>

    <button class="btn-reset-all" onclick="reinitialiserTout()">TOUT RÉINSTALLER</button>

    <a href="https://wa.me/50931535783?text=Bonjour,%20je%20souhaite%20placer%20une%20publicité." class="ads-space">
        📢 <b>ESPACE PUBLICITAIRE RÉSERVÉ</b><br>
        Cliquez pour me contacter sur WhatsApp
    </a>

    <div class="contact-grid">
        <a href="mailto:corvensleysteeveperrier@gmail.com" class="btn-contact" style="background:#db4437;">📧 Compte Google</a>
        <a href="https://wa.me/40614011" class="btn-contact" style="background:#25d366;">💬 WhatsApp</a>
    </div>

    <div class="profile-footer">
        <b>Corvensley Steeve Perrier</b><br>
        <span style="opacity: 0.7;">Développeur Logiciel 🇭🇹</span>
    </div>
</div>

<script>
function verifierNote() {
    const n = document.getElementById('ma_note');
    const c = document.getElementById('mon_coeff');
    const noteVal = parseFloat(n.value);
    const coeffVal = parseFloat(c.value);

    // Si la note dépasse le coefficient, on met en rouge
    if (!isNaN(noteVal) && !isNaN(coeffVal) && noteVal > coeffVal) {
        n.classList.add('input-error');
    } else {
        n.classList.remove('input-error');
    }
}

function calculerNote() {
    const note = parseFloat(document.getElementById('ma_note').value);
    const coeff = parseFloat(document.getElementById('mon_coeff').value);
    
    if (isNaN(note) || isNaN(coeff)) {
        alert("Veuillez remplir les deux cases !");
        return;
    }
    
    if (note > coeff) {
        alert("Erreur : La note ne peut pas être supérieure au coefficient !");
        return;
    }

    const resultat = (note / coeff) * 10;
    document.getElementById('ecran_note').innerText = resultat.toFixed(2) + " / 10";
    
    const divMsg = document.getElementById('msg_encouragement');
    divMsg.style.display = "block";
    
    if(resultat >= 8.5) divMsg.innerHTML = "🌟 Excellent ! Quel talent !";
    else if(resultat >= 7) divMsg.innerHTML = "👏 Très bien ! Continue ainsi !";
    else if(resultat >= 5) divMsg.innerHTML = "✅ Tu as la moyenne, bien joué !";
    else divMsg.innerHTML = "❌ Courage, travaille encore plus dur !";
}

function effacerCalcul() {
    document.getElementById('ma_note').value = "";
    document.getElementById('mon_coeff').value = "";
    document.getElementById('ecran_note').innerText = "-- / 10";
    document.getElementById('msg_encouragement').style.display = "none";
    document.getElementById('ma_note').classList.remove('input-error');
}

function reinitialiserTout() {
    if(confirm("Effacer toutes les données de la page ?")) location.reload();
}
</script>
</body>
</html>
